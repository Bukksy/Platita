{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Platita (❁´◡`❁)</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    {% block extra_css %}{% endblock %}

    <style>
        :root {
            --primary-teal: #4db6ac;
            --soft-teal: #e0f2f1;
            --text-gray-main: #949fb7;
            --text-gray-light: #b2b9ca;
            --bg-body: #f8fafb;
            --accent-pink: #f06292;
        }

        body {
            background-color: var(--bg-body);
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
        }

        .navbar-custom {
            background-color: white;
            padding-top: 15px;
            border-bottom: 1px solid #edf2f7;
        }

        .nav-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon-bg {
            background-color: var(--soft-teal);
            color: var(--primary-teal);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .brand-text-main {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--text-gray-main);
            margin: 0;
            line-height: 1;
        }

        .brand-sub { 
            font-size: 0.8rem; 
            color: var(--text-gray-light); 
            margin: 0; 
            letter-spacing: 0.5px;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hola-pill {
            background-color: #f0fdfa;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #2d3436;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hola-pill i {
            color: var(--active-color, var(--primary-teal)) !important;
        }

        .profile-stack {
            display: flex;
            position: relative;
            align-items: center;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 0.7rem;
            border: 2px solid white;
            transition: all 0.3s ease;
        }

        /* Colores específicos para Renato y Belén */
        .avatar-r { background-color: #26a69a; z-index: 2; }
        .avatar-b { background-color: #ce93d8; margin-left: -10px; z-index: 1; }

        /* Efecto de iluminado para el usuario activo */
        .avatar.active-user {
            transform: scale(1.15);
            box-shadow: 0 0 0 2px var(--active-color, var(--primary-teal));
            z-index: 3;
        }

        .avatar.inactive-user {
            opacity: 0.4;
            filter: grayscale(0.5);
        }

        .nav-divider {
            height: 1px;
            background-color: #edf2f7;
            width: 100%;
        }

        .nav-tabs-row {
            display: flex;
            justify-content: flex-start;
            gap: 25px;
            margin-bottom: -1px;
        }

        .nav-link-custom {
            text-decoration: none;
            color: #718096;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 12px 5px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .nav-link-custom.active {
                color: var(--active-color, var(--primary-teal)); /* Usa teal por defecto */
                border-bottom: 2px solid var(--active-color, var(--primary-teal));
                transition: all 0.3s ease; /* Para que el cambio de color sea suave */
            }

            .theme-teal {
                --active-color: #26a69a; /* El color de .avatar-r */
            }

            .theme-purple {
                --active-color: #ce93d8; /* El color de .avatar-b */
            }

        .logout-btn {
            background: none;
            border: none;
            color: var(--text-gray-light);
            padding: 0;
            transition: color 0.2s;
        }

        .logout-btn:hover {
            color: var(--accent-pink);
        }

        @media (max-width: 768px) {
            .nav-tabs-row { 
                gap: 12px; 
                overflow-x: auto; 
                padding-bottom: 5px;
            }
            .hola-pill { display: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar-custom shadow-sm sticky-top 
    {% if user.username|lower == 'renato' %}theme-teal
    {% elif user.username|lower == 'belen' %}theme-purple
    {% endif %}">
        <div class="container">
            <div class="nav-top-row">
                <div class="logo-wrapper">
                    <div class="logo-icon-bg">
                        <i class="bi bi-piggy-bank"></i>
                    </div>
                    <div>
                        <p class="brand-text-main">Platita</p>
                        <p class="brand-sub" id="current-date"></p>
                    </div>
                </div>

                <div class="user-section">
                    {% if user.is_authenticated %}
                        <div class="hola-pill">
                            <i class="bi bi-person-circle" style="color: var(--primary-teal)"></i>
                            Hola, {{ user.username|title }}
                        </div>
                        
                        <div class="profile-stack">
                            <div class="avatar avatar-r 
                                {% if user.username|lower == 'renato' %}active-user{% else %}inactive-user{% endif %}" 
                                title="Renato">R</div>
                            
                            <div class="avatar avatar-b 
                                {% if user.username|lower == 'belen' %}active-user{% else %}inactive-user{% endif %}" 
                                title="Belén">B</div>
                        </div>

                        <form action="{% url 'logout' %}" method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="submit" class="logout-btn fs-5 ms-2" title="Cerrar Sesión">
                                <i class="bi bi-box-arrow-right"></i>
                            </button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-sm btn-outline-primary rounded-pill px-3">Entrar</a>
                    {% endif %}
                </div>
            </div>

            <div class="nav-divider"></div>

            <div class="nav-tabs-row">
                <a href="{% url 'home' %}" class="nav-link-custom {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                    <i class="bi bi-house"></i> Inicio
                </a>
                <a href="{% url 'sueldos' %}" class="nav-link-custom {% if request.resolver_match.url_name == 'sueldos' %}active{% endif %}">
                    <i class="bi bi-wallet2"></i> Sueldo
                </a>
                <a href="{% url 'gastos' %}" class="nav-link-custom {% if request.resolver_match.url_name == 'gastos' %}active{% endif %}">
                    <i class="bi bi-cash-stack"></i> Gastos
                </a>
                <a href="{% url 'ahorro' %}" class="nav-link-custom {% if request.resolver_match.url_name == 'ahorro' %}active{% endif %}">
                    <i class="bi bi-calendar-check"></i> Ahorros
                </a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateDate() {
            const now = new Date();
            const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('es-CL', options).replace(/\//g, '-');
        }
        updateDate();
    </script>
</body>
</html>
