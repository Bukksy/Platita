{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platita - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            background: radial-gradient(circle at top left, #fdfcfb 0%, #e2d1c3 100%);
            background-attachment: fixed;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Decoración de fondo */
        .shape { position: absolute; filter: blur(40px); opacity: 0.4; z-index: -1; }
        .shape-1 { top: 10%; left: 10%; width: 200px; height: 200px; background: #ffcdd2; border-radius: 50%; }
        .shape-2 { bottom: 10%; right: 10%; width: 250px; height: 250px; background: #b2dfdb; border-radius: 50%; }

        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }

        .logo-icon {
            background-color: #e0f2f1;
            color: #4db6ac;
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 20px;
        }

        .brand-name { color: #e57373; font-weight: 800; font-size: 1.8rem; margin-bottom: 5px; }
        .brand-sub { color: #949fb7; font-size: 0.9rem; margin-bottom: 30px; }

        .form-label { color: #718096; font-weight: 600; font-size: 0.85rem; text-align: left; display: block; margin-left: 5px; }
        
        .form-control {
            border-radius: 15px;
            padding: 12px 15px;
            border: 1px solid #edf2f7;
            background: rgba(255, 255, 255, 0.9);
            margin-bottom: 20px;
        }

        .btn-login {
            background-color: #81c784;
            border: none;
            border-radius: 15px;
            padding: 12px;
            color: white;
            font-weight: 700;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-login:hover { background-color: #66bb6a; transform: translateY(-2px); }

        .footer-text { color: #f06292; font-size: 0.8rem; margin-top: 30px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="login-card">
        <div class="logo-icon"><i class="bi bi-piggy-bank"></i></div>
        <h1 class="brand-name">Chauchita</h1>
        <p class="brand-sub">TOrganizar las finanzas</p>

        <form method="POST">
            {% csrf_token %}
            <label class="form-label">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Tu nombre de usuario" required>
            
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="Tu contraseña secreta" required>

            <button type="submit" class="btn-login">
                <i class="bi bi-stars"></i> Iniciar sesión
            </button>
        </form>

        <div class="footer-text">
            <i class="bi bi-heart-fill"></i> Solo para nosotros <i class="bi bi-heart-fill"></i>
        </div>
    </div>
</body>
</html>
