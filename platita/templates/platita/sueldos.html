{% extends 'platita/base.html' %}

{% load humanize %}



{% block content %}

<div class="main-card shadow-sm p-4 bg-white rounded-4">

    <div class="d-flex align-items-center mb-4">

        <div class="avatar {% if perfil.usuario.username|lower == 'renato' %}avatar-r{% else %}avatar-b{% endif %} active-user me-3" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;">

            {{ perfil.usuario.username|first|upper }}

        </div>

        <div>

            <h2 class="h4 m-0 fw-bold" style="color: #2d3748;">Gestión de Sueldo</h2>

            <p class="text-muted small m-0">{{ perfil.usuario.username|title }}</p>

        </div>

    </div>



    <form method="get" class="mb-4">

        <label class="form-label small fw-bold text-muted text-uppercase">Seleccionar Mes</label>

        <select name="mes" class="form-select border-0 bg-light fw-semibold" onchange="this.form.submit()" style="border-radius: 12px; padding: 12px; color: #2d3748;">

            {% for num, nombre in meses_lista %}

                <option value="{{ num }}" {% if num == registro.mes %}selected{% endif %}>{{ nombre }}</option>

            {% endfor %}

        </select>

    </form>



    <form method="post" class="row g-3">

        {% csrf_token %}

        <div class="col-md-6">

            <div class="p-3 rounded-4" style="background-color: #f7fafc; border: 2px solid #e2e8f0;">

                <label class="form-label small text-muted fw-bold">Sueldo Base ({{ mes_nombre }})</label>

                <div class="d-flex align-items-center">

                    <span class="fw-bold fs-4 me-2" style="color: #2d3748;">$</span>

                    <input type="number"

                           name="sueldo_base"

                           class="form-control border-0 bg-transparent fw-bold fs-4 p-0"

                           value="{{ registro.sueldo_base|stringformat:'d' }}"

                           step="1"

                           style="color: #2d3748; box-shadow: none !important;">

                </div>

            </div>

        </div>

        <div class="col-md-6">

            <div class="p-3 rounded-4" style="background-color: #f7fafc; border: 2px solid #e2e8f0;">

                <label class="form-label small text-muted fw-bold">Horas Extras</label>

                <div class="d-flex align-items-center">

                    <span class="fw-bold fs-4 me-2 text-success">$</span>

                    <input type="number"

                           name="horas_extras"

                           class="form-control border-0 bg-transparent fw-bold fs-4 text-success p-0"

                           value="{{ registro.horas_extras|stringformat:'d' }}"

                           step="1"

                           style="box-shadow: none !important;">

                </div>

            </div>

        </div>

        <div class="col-12 text-end mt-4">

            <button type="submit" class="btn text-white px-5 py-2 rounded-pill shadow-sm fw-bold" style="background-color: #38b2ac; border: none;">

                Guardar Cambios de {{ mes_nombre }}

            </button>

        </div>

    </form>



    <div class="mt-4 p-4 rounded-4" style="background-color: #e6fffa; border: 1px solid #b2f5ea;">

        <div class="d-flex justify-content-between align-items-center">

            <span class="fw-bold text-dark fs-5">Total a recibir en {{ mes_nombre }}:</span>

            <span class="h2 m-0 fw-bold" style="color: #2c7a7b;">${{ registro.total_mes|floatformat:0|intcomma }}</span>

        </div>

    </div>

</div>

{% endblock %}
